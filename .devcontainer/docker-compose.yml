services:
  pebble-sdk:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
      args:
        PEBBLE_SDK_VERSION: "4.17"
        NODE_VERSION: "20"
        NVM_VERSION: "0.35.0"
    platform: linux/amd64
    container_name: pebble-sdk-container
    restart: unless-stopped
    volumes:
      - ..:/workspace
      - /mnt/host/wslg:/mnt/wslg  # Docker Desktop's WSL2 VM exposes the real WSLg sockets under /mnt/host/wslg, not /mnt/wslg (that path is empty in the docker-desktop VM itself)
    environment:
      - PEBBLE_SDK_VERSION=4.17
      - NVM_VERSION=0.35.0
      - NODE_VERSION=20
      - NVM_DIR=/home/pebble/.nvm
      - DISPLAY=:0  # WSLg's fixed X11 display, backed by /mnt/wslg/.X11-unix/X0
      - WAYLAND_DISPLAY=wayland-0
      - XDG_RUNTIME_DIR=/mnt/wslg/runtime-dir
      - PULSE_SERVER=/mnt/wslg/PulseServer
      - SDL_VIDEODRIVER=x11  # Use XWayland instead of native Wayland+libdecor for the emulator window
    ports:
      - "59443:59443"  # Required for emulator
    network_mode: "host"  # Required for proper emulator display on some systems
    working_dir: /workspace
    stdin_open: true
    tty: true  # Keep the container interactive
